<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Circuits vélo club 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Club vélo</p>
      <h1>Circuits GPX 2026</h1>
      <p class="subtitle">Recherche par date, distance ou dénivelé, aperçu rapide du tracé et téléchargement du GPX.</p>
    </div>
    <div class="stats" id="stats" aria-label="Statistiques globales"></div>
  </header>

  <main>
    <section class="panel filters" aria-label="Filtres de recherche">
      <label class="wide">Recherche
        <input id="search" type="search" placeholder="Ex. 17 janvier, 2026-01-17, Girafes…" autocomplete="off">
      </label>
      <label>Aller à une date
        <select id="quickDate"><option value="">Choisir une date</option></select>
      </label>
      <label>Mois
        <select id="month"><option value="">Tous les mois</option></select>
      </label>
      <label>Distance mini
        <input id="minKm" type="number" min="0" step="5" placeholder="km">
      </label>
      <label>D+ mini
        <input id="minElev" type="number" min="0" step="50" placeholder="m">
      </label>
      <label>Tri
        <select id="sort">
          <option value="date">Date</option>
          <option value="distance_desc">Distance décroissante</option>
          <option value="elevation_desc">D+ décroissant</option>
          <option value="title">Nom</option>
        </select>
      </label>
    </section>

    <section class="grid">
      <aside class="panel list">
        <div class="list-header"><h2>Parcours</h2><span id="count"></span></div>
        <div id="routes"></div>
      </aside>

      <section class="panel detail">
        <div id="details" class="details-empty">Sélectionne un parcours pour afficher ses données et son aperçu.</div>
      </section>
    </section>
  </main>

  <footer>
    Page statique prête pour GitHub Pages — aperçu optimisé mobile, sans chargement de tuiles de carte.
  </footer>

  <script src="script.js"></script>
</body>
</html>
